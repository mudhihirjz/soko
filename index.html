<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolutionary Trading System</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        /* ============================================ */
        /* RESET & BASE                                */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e1a;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Background glow */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 180, 50, 0.03) 0%, transparent 70%);
            animation: pulseGlow 6s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        /* ============================================ */
        /* PAGE CONTAINERS (Muundo Mpya Bila Absolute) */
        /* ============================================ */
        .page {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
        }

        /* Welcoming Page */
        #welcomingPage {
            display: flex;
            transition: opacity 0.5s ease;
        }

        #welcomingPage.hidden {
            display: none !important; /* Inafutwa kabisa isilete blank space */
        }

        /* Landing Page */
        #landingPage {
            display: none; /* Haionekani kabisa mwanzoni */
        }

        #landingPage.visible {
            display: flex; /* Inatokea na kujaza skrini */
            animation: fadeInPage 0.6s ease forwards;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ============================================ */
        /* WELCOMING PAGE STYLES                       */
        /* ============================================ */
        .welcoming-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 85vh;
            width: 100%;
            max-width: 600px;
        }

        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 15px;
            width: 100%;
        }

        .word-line {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 1.5em;
        }

        .animated-word {
            font-size: clamp(1.8rem, 7vw, 3.8rem); /* Imepunguzwa kidogo ili isivuje (overflow) kwenye simu */
            font-weight: 900;
            letter-spacing: 0.04em;
            color: transparent;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmerText 4s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(253, 160, 133, 0.15);
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            text-transform: uppercase;
            text-align: center;
            display: inline-block;
            word-break: break-all;
        }

        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 0.85em;
            background: #f6d365;
            margin-left: 4px;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .welcoming-footer {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-content .powered {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .footer-content .brand {
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .footer-divider {
            width: 35px;
            height: 2px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 2px;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        /* ============================================ */
        /* LANDING PAGE STYLES                         */
        /* ============================================ */
        .landing-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1000px;
        }

        .landing-title {
            font-size: clamp(1.4rem, 6vw, 3rem);
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 4s ease-in-out infinite;
            margin-bottom: 12px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .landing-subtitle {
            font-size: clamp(0.9rem, 2.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 300;
            line-height: 1.5;
            max-width: 600px;
        }

        .tabs-container {
            display: flex;
            gap: 25px;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            min-width: 270px;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        .tab:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        @media (hover: hover) {
            .tab:hover {
                transform: translateY(-5px);
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(246, 211, 101, 0.2);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            }
        }

        .tab-label {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        .tab-icon {
            font-size: clamp(3rem, 8vw, 4.5rem);
            color: #1a1a1a;
            background: #f6d365;
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(246, 211, 101, 0.15);
        }

        .tab-role {
            font-size: 1.4rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tab-arrow {
            color: rgba(255, 255, 255, 0.2);
            font-size: 1rem;
        }

        /* ============================================ */
        /* RESPONSIVE TIMING & FIXES                   */
        /* ============================================ */
        @media (max-width: 680px) {
            .tabs-container {
                flex-direction: column;
                width: 100%;
            }
            .tab {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>
<body>

    <div class="page" id="welcomingPage">
        <div class="welcoming-container">
            <div class="text-container">
                <div class="word-line">
                    <div class="animated-word" id="animatedWord1"></div>
                </div>
                <div class="word-line">
                    <div class="animated-word" id="animatedWord2"></div>
                </div>
            </div>
            <footer class="welcoming-footer">
                <div class="footer-content">
                    <div class="footer-divider"></div>
                    <span class="powered"><i class="fa-regular fa-gem"></i> Powered by</span>
                    <span class="brand"><i class="fa-solid fa-code"></i> MudhihirjzTech</span>
                </div>
            </footer>
        </div>
    </div>

    <div class="page" id="landingPage">
        <div class="landing-container">
            <h1 class="landing-title">
                <i class="fa-solid fa-chart-line" style="font-size: 0.7em; margin-right: 8px; opacity: 0.5;"></i>
                EVOLUTIONARY TRADING SYSTEM
            </h1>
            <p class="landing-subtitle">
                <i class="fa-regular fa-hand-peace" style="margin-right: 6px; color: #f6d365;"></i>
                Welcome to your new and updated community, online market.!
            </p>
            <div class="tabs-container">
                <div class="tab" id="customerTab">
                    <div class="tab-label"><i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>Welcome to the market.!</div>
                    <div class="tab-icon"><i class="fa-solid fa-store"></i></div>
                    <div class="tab-role">Customer</div>
                    <div class="tab-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                </div>
                <div class="tab" id="traderTab">
                    <div class="tab-label"><i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>Welcome to the market.!</div>
                    <div class="tab-icon"><i class="fa-solid fa-briefcase"></i></div>
                    <div class="tab-role">Trader</div>
                    <div class="tab-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // Mbinu salama ya uandishi wa herufi (Inayokubalika kwenye simu zote)
            const text1 = "EVOLUTIONARY";
            const text2 = "TRADING";
            
            const container1 = document.getElementById('animatedWord1');
            const container2 = document.getElementById('animatedWord2');
            
            let charIndex1 = 0;
            let charIndex2 = 0;

            function typeWord1() {
                if (charIndex1 < text1.length) {
                    container1.textContent += text1.charAt(charIndex1);
                    charIndex1++;
                    setTimeout(typeWord1, 100);
                } else {
                    // Anza neno la pili baada ya la kwanza kuisha
                    setTimeout(typeWord2, 200);
                }
            }

            function typeWord2() {
                if (charIndex2 < text2.length) {
                    container2.textContent += text2.charAt(charIndex2);
                    charIndex2++;
                    setTimeout(typeWord2, 100);
                }
            }

            // Kuanzisha kazi
            window.addEventListener('DOMContentLoaded', () => {
                // Anza kuandika
                setTimeout(typeWord1, 400);

                // Badilisha kurasa baada ya sekunde 3.2 cleanly
                setTimeout(() => {
                    const welcome = document.getElementById('welcomingPage');
                    const landing = document.getElementById('landingPage');
                    
                    welcome.style.opacity = '0';
                    setTimeout(() => {
                        welcome.classList.add('hidden');
                        landing.classList.add('visible');
                    }, 400);
                }, 3200);
            });
        })();
    </script>
</body>
</html>
