<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolutionary Trading System</title>

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        /* ============================================ */
        /* RESET & BASE                                */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b0e1a;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background glow - optimized */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 180, 50, 0.03) 0%, transparent 70%);
            animation: pulseGlow 8s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
            will-change: transform, opacity;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        /* ============================================ */
        /* PAGE CONTAINERS                             */
        /* ============================================ */
        .page {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            z-index: 1;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Welcoming Page */
        #welcomingPage {
            opacity: 1;
            transform: scale(1);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: all;
        }

        #welcomingPage.hidden {
            opacity: 0 !important;
            transform: scale(0.95) !important;
            pointer-events: none !important;
        }

        /* Landing Page */
        #landingPage {
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.6s ease, transform 0.6s ease;
            pointer-events: none;
            display: flex;
        }

        #landingPage.visible {
            opacity: 1 !important;
            transform: scale(1) !important;
            pointer-events: all !important;
        }

        /* ============================================ */
        /* WELCOMING PAGE STYLES                       */
        /* ============================================ */
        .welcoming-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            height: 100%;
        }

        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            gap: 10px;
            width: 100%;
            padding: 10px;
        }

        .word-line {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 1.5em;
            padding: 0 10px;
        }

        .animated-word {
            font-size: clamp(1.4rem, 6vw, 3.2rem);
            font-weight: 900;
            letter-spacing: 0.03em;
            color: transparent;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmerText 5s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(253, 160, 133, 0.1);
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            text-transform: uppercase;
            text-align: center;
            display: inline-block;
            word-break: break-word;
            max-width: 100%;
            padding: 0 5px;
        }

        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor {
            display: none;
        }

        .welcoming-footer {
            width: 100%;
            padding: 15px 0 5px 0;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 20px;
            flex-shrink: 0;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-content .powered {
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .footer-content .brand {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .footer-divider {
            width: 30px;
            height: 2px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 2px;
            margin-bottom: 6px;
            opacity: 0.3;
        }

        /* ============================================ */
        /* LANDING PAGE STYLES                         */
        /* ============================================ */
        .landing-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
            height: 100%;
        }

        .landing-title {
            font-size: clamp(1.2rem, 5vw, 2.8rem);
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 5s ease-in-out infinite;
            margin-bottom: 10px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
            padding: 0 15px;
            word-break: break-word;
            flex-shrink: 0;
        }

        .landing-subtitle {
            font-size: clamp(0.85rem, 2.2vw, 1.2rem);
            color: rgba(255, 255, 255, 0.65);
            text-align: center;
            margin-bottom: 35px;
            font-weight: 300;
            line-height: 1.6;
            max-width: 550px;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .tabs-container {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 0 10px;
            flex: 1;
            align-content: center;
        }

        .tab {
            flex: 1;
            min-width: 240px;
            max-width: 340px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .tab:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        @media (hover: hover) {
            .tab:hover {
                transform: translateY(-4px);
                background: rgba(255, 255, 255, 0.06);
                border-color: rgba(246, 211, 101, 0.2);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            }
        }

        .tab-label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .tab-icon {
            font-size: clamp(2.8rem, 7vw, 4.2rem);
            color: #1a1a1a;
            background: #f6d365;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            box-shadow: 0 6px 20px rgba(246, 211, 101, 0.15);
            transition: transform 0.3s ease;
        }

        .tab:active .tab-icon {
            transform: scale(0.92);
        }

        .tab-role {
            font-size: 1.2rem;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .tab-arrow {
            color: rgba(255, 255, 255, 0.15);
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .tab:hover .tab-arrow {
            transform: translateX(4px);
        }

        /* Tab click feedback */
        .tab-loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 14, 26, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            border-radius: 24px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            gap: 10px;
        }

        .tab-loading.active {
            display: flex;
        }

        .tab-loading .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #f6d365;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ============================================ */
        /* TOAST NOTIFICATION                          */
        /* ============================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(11, 14, 26, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(246, 211, 101, 0.2);
            border-radius: 16px;
            padding: 16px 24px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            opacity: 0;
            z-index: 1000;
            max-width: 90%;
            text-align: center;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast i {
            color: #f6d365;
            margin-right: 10px;
        }

        /* ============================================ */
        /* RESPONSIVE FIXES                           */
        /* ============================================ */
        @media (max-width: 768px) {
            .welcoming-container {
                padding: 15px;
            }

            .text-container {
                gap: 8px;
            }

            .animated-word {
                font-size: clamp(1.2rem, 5.5vw, 2.5rem);
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 15px;
            }

            .welcoming-container {
                padding: 10px;
            }

            .text-container {
                gap: 5px;
                padding: 5px;
            }

            .animated-word {
                font-size: clamp(1rem, 5vw, 2rem);
            }

            .landing-title {
                font-size: clamp(1rem, 4.5vw, 1.8rem);
            }

            .tabs-container {
                gap: 15px;
                padding: 0 5px;
            }

            .tab {
                min-width: 200px;
                padding: 25px 15px;
                gap: 10px;
            }

            .tab-icon {
                width: 65px;
                height: 65px;
                font-size: clamp(2.2rem, 6vw, 3rem);
            }

            .tab-role {
                font-size: 1rem;
            }

            .tab-label {
                font-size: 0.75rem;
            }

            .toast {
                bottom: 20px;
                padding: 14px 18px;
                font-size: 0.8rem;
                max-width: 95%;
            }
        }

        @media (max-width: 360px) {
            .animated-word {
                font-size: clamp(0.9rem, 4.5vw, 1.5rem);
            }

            .tab {
                min-width: 160px;
                padding: 20px 12px;
            }

            .tab-icon {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
            }

            .tab-role {
                font-size: 0.85rem;
            }
        }

        /* Safe area for notch phones */
        @supports (padding: max(0px)) {
            .page {
                padding-left: max(20px, env(safe-area-inset-left));
                padding-right: max(20px, env(safe-area-inset-right));
                padding-top: max(20px, env(safe-area-inset-top));
                padding-bottom: max(20px, env(safe-area-inset-bottom));
            }
        }

        /* Reduce motion preference */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }

            body::before {
                animation: none !important;
            }

            .animated-word {
                animation: none !important;
                background: linear-gradient(135deg, #f6d365, #fda085);
                -webkit-background-clip: text;
                background-clip: text;
            }

            .landing-title {
                animation: none !important;
                background: linear-gradient(135deg, #f6d365, #fda085);
                -webkit-background-clip: text;
                background-clip: text;
            }
        }
    </style>
</head>
<body>

    <!-- ===== WELCOMING PAGE ===== -->
    <div class="page" id="welcomingPage">
        <div class="welcoming-container">
            <div class="text-container">
                <div class="word-line">
                    <div class="animated-word" id="animatedWord1"></div>
                </div>
                <div class="word-line">
                    <div class="animated-word" id="animatedWord2"></div>
                </div>
            </div>
            <footer class="welcoming-footer">
                <div class="footer-content">
                    <div class="footer-divider"></div>
                    <span class="powered"><i class="fa-regular fa-gem"></i> Powered by</span>
                    <span class="brand"><i class="fa-solid fa-code"></i> MudhihirjzTech</span>
                </div>
            </footer>
        </div>
    </div>

    <!-- ===== LANDING PAGE ===== -->
    <div class="page" id="landingPage">
        <div class="landing-container">
            <h1 class="landing-title">
                <i class="fa-solid fa-chart-line" style="font-size: 0.7em; margin-right: 8px; opacity: 0.5;"></i>
                EVOLUTIONARY TRADING SYSTEM
            </h1>
            <p class="landing-subtitle">
                <i class="fa-regular fa-hand-peace" style="margin-right: 6px; color: #f6d365;"></i>
                Welcome to your new and updated community, online market.!
            </p>
            <div class="tabs-container">
                <!-- Customer Tab -->
                <div class="tab" id="customerTab" role="button" tabindex="0" aria-label="Ingia kama Mteja">
                    <div class="tab-label"><i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>Welcome to the market.!</div>
                    <div class="tab-icon"><i class="fa-solid fa-store"></i></div>
                    <div class="tab-role">Customer</div>
                    <div class="tab-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                    <div class="tab-loading">
                        <div class="spinner"></div>
                        <span>Loading...</span>
                    </div>
                </div>

                <!-- Trader Tab -->
                <div class="tab" id="traderTab" role="button" tabindex="0" aria-label="Ingia kama Trader">
                    <div class="tab-label"><i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>Welcome to the market.!</div>
                    <div class="tab-icon"><i class="fa-solid fa-briefcase"></i></div>
                    <div class="tab-role">Trader</div>
                    <div class="tab-arrow"><i class="fa-solid fa-arrow-right"></i></div>
                    <div class="tab-loading">
                        <div class="spinner"></div>
                        <span>Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== TOAST NOTIFICATION ===== -->
    <div class="toast" id="toast">
        <i class="fa-solid fa-check-circle"></i>
        <span id="toastMessage">Welcome!</span>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================
            // SAFE DOM REFERENCES
            // ============================================
            const container1 = document.getElementById('animatedWord1');
            const container2 = document.getElementById('animatedWord2');
            const welcomePage = document.getElementById('welcomingPage');
            const landingPage = document.getElementById('landingPage');
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');

            if (!container1 || !container2 || !welcomePage || !landingPage) {
                return;
            }

            // ============================================
            // CONSTANTS
            // ============================================
            const TEXT1 = 'EVOLUTIONARY';
            const TEXT2 = 'TRADING';
            const TYPING_SPEED = 80;
            const START_DELAY = 300;
            const PAGE_TRANSITION_DELAY = 3500;

            // ============================================
            // STATE MANAGEMENT
            // ============================================
            let charIndex1 = 0;
            let charIndex2 = 0;
            let isTypingComplete = false;
            let timeoutIds = [];
            let isTransitioning = false;

            // ============================================
            // CLEANUP FUNCTIONS
            // ============================================
            function clearAllTimeouts() {
                timeoutIds.forEach(id => {
                    if (id) clearTimeout(id);
                });
                timeoutIds = [];
            }

            function safeSetTimeout(fn, delay) {
                const id = setTimeout(() => {
                    try {
                        fn();
                    } catch (e) {
                        // Silent fail
                    }
                }, delay);
                timeoutIds.push(id);
                return id;
            }

            // ============================================
            // TYPING FUNCTIONS
            // ============================================
            function typeWord1() {
                if (isTypingComplete || isTransitioning) return;

                if (charIndex1 < TEXT1.length) {
                    const char = TEXT1.charAt(charIndex1);
                    container1.textContent += char;
                    charIndex1++;
                    safeSetTimeout(typeWord1, TYPING_SPEED);
                } else {
                    safeSetTimeout(typeWord2, 200);
                }
            }

            function typeWord2() {
                if (isTypingComplete || isTransitioning) return;

                if (charIndex2 < TEXT2.length) {
                    const char = TEXT2.charAt(charIndex2);
                    container2.textContent += char;
                    charIndex2++;
                    safeSetTimeout(typeWord2, TYPING_SPEED);
                } else {
                    isTypingComplete = true;
                    safeSetTimeout(transitionToLanding, 800);
                }
            }

            // ============================================
            // PAGE TRANSITION
            // ============================================
            function transitionToLanding() {
                if (isTransitioning) return;
                isTransitioning = true;

                clearAllTimeouts();

                welcomePage.classList.add('hidden');

                safeSetTimeout(function() {
                    landingPage.classList.add('visible');
                    showToast('Welcome to Evolutionary Trading System!');
                    isTransitioning = false;
                }, 650);
            }

            // ============================================
            // TOAST NOTIFICATION
            // ============================================
            let toastTimeout = null;

            function showToast(message) {
                if (!toast || !toastMessage) return;

                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                    toastTimeout = null;
                }

                toastMessage.textContent = message;
                toast.classList.add('show');

                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimeout = null;
                }, 3500);
            }

            function hideToast() {
                if (toast) {
                    toast.classList.remove('show');
                }
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                    toastTimeout = null;
                }
            }

            // ============================================
            // TAB HANDLING
            // ============================================
            function handleTabClick(role, element) {
                if (element.classList.contains('clicked')) return;

                const loading = element.querySelector('.tab-loading');
                if (loading) {
                    loading.classList.add('active');
                }

                element.classList.add('clicked');

                setTimeout(() => {
                    if (loading) {
                        loading.classList.remove('active');
                    }
                    showToast('Welcome ' + role + '! You\'re now logged in as a ' + role + '.');
                    setTimeout(() => {
                        element.classList.remove('clicked');
                    }, 2000);
                }, 1500);
            }

            // ============================================
            // SETUP TABS
            // ============================================
            function setupTabs() {
                const customerTab = document.getElementById('customerTab');
                const traderTab = document.getElementById('traderTab');

                if (customerTab) {
                    const handler = function(e) {
                        e.preventDefault();
                        handleTabClick('Customer', customerTab);
                    };
                    customerTab.addEventListener('click', handler);
                    customerTab.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            handleTabClick('Customer', customerTab);
                        }
                    });
                }

                if (traderTab) {
                    const handler = function(e) {
                        e.preventDefault();
                        handleTabClick('Trader', traderTab);
                    };
                    traderTab.addEventListener('click', handler);
                    traderTab.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            handleTabClick('Trader', traderTab);
                        }
                    });
                }
            }

            // ============================================
            // INITIALIZATION
            // ============================================
            function init() {
                try {
                    setupTabs();
                    container1.textContent = '';
                    container2.textContent = '';
                    safeSetTimeout(typeWord1, START_DELAY);

                    safeSetTimeout(function() {
                        if (!isTypingComplete && !isTransitioning) {
                            container1.textContent = TEXT1;
                            container2.textContent = TEXT2;
                            isTypingComplete = true;
                            transitionToLanding();
                        }
                    }, 6000);
                } catch (e) {
                    // Silent fail - show landing page directly
                    welcomePage.classList.add('hidden');
                    landingPage.classList.add('visible');
                }
            }

            // ============================================
            // START
            // ============================================
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            window.addEventListener('beforeunload', function() {
                clearAllTimeouts();
                hideToast();
            });

        })();
    </script>
</body>
</html>
