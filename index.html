<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Evolutionary Trading System</title>

    <!-- Font Awesome CDN -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
        /* ============================================ */
        /* RESET & BASE                                */
        /* ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b0e1a 0%, #1a1f2f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background glow */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 180, 50, 0.03) 0%, transparent 70%);
            animation: pulseGlow 6s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.2); opacity: 0.6; }
        }

        /* ============================================ */
        /* PAGE CONTAINERS                              */
        /* ============================================ */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            z-index: 1;
        }

        /* Welcoming Page */
        #welcomingPage {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        #welcomingPage.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }

        /* Landing Page */
        #landingPage {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
            z-index: 2;
        }

        #landingPage.visible {
            opacity: 1;
            transform: scale(1);
            pointer-events: auto;
        }

        /* ============================================ */
        /* WELCOMING PAGE STYLES                       */
        /* ============================================ */
        .welcoming-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            max-width: 1200px;
        }

        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            flex: 1;
            padding: 40px 20px;
            gap: 10px;
            width: 100%;
        }

        .word-line {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            min-height: 1.2em;
        }

        .animated-word {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: 0.04em;
            color: transparent;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmerText 4s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(253, 160, 133, 0.2);
            font-family: 'Segoe UI', 'Arial Black', sans-serif;
            text-transform: uppercase;
            white-space: nowrap;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-line:last-child .animated-word {
            font-size: clamp(1.8rem, 7vw, 4rem);
            letter-spacing: 0.06em;
        }

        @keyframes shimmerText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 0.85em;
            background: #f6d365;
            margin-left: 4px;
            animation: blink 0.8s step-end infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* Footer ya welcoming page */
        .welcoming-footer {
            width: 100%;
            padding: 25px 20px 20px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 10px;
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-content .powered {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 300;
        }

        .footer-content .brand {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        .footer-content .brand i {
            margin-right: 8px;
            font-size: 0.85rem;
            color: #f6d365;
            opacity: 0.6;
        }

        .footer-divider {
            width: 35px;
            height: 2px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 2px;
            margin: 2px auto 8px;
            opacity: 0.3;
        }

        /* ============================================ */
        /* LANDING PAGE STYLES                         */
        /* ============================================ */
        .landing-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
            max-width: 1200px;
            padding: 40px 20px;
        }

        /* Title */
        .landing-title {
            font-size: clamp(1.8rem, 6vw, 4rem);
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f6d365 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmerText 4s ease-in-out infinite;
            margin-bottom: 15px;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        /* Subtitle */
        .landing-subtitle {
            font-size: clamp(1rem, 2.5vw, 1.6rem);
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 1px;
            line-height: 1.6;
            max-width: 800px;
        }

        /* Tabs Container */
        .tabs-container {
            display: flex;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            justify-content: center;
            align-items: stretch;
            flex-wrap: wrap;
        }

        /* Single Tab */
        .tab {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px 30px 35px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .tab:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(246, 211, 101, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .tab:active {
            transform: scale(0.96);
        }

        /* Tab Label (Welcome to the market.!) */
        .tab-label {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: rgba(255, 255, 255, 0.8);
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Tab Icon */
        .tab-icon {
            font-size: clamp(4rem, 10vw, 6rem);
            color: #1a1a1a;
            background: #f6d365;
            width: clamp(90px, 15vw, 130px);
            height: clamp(90px, 15vw, 130px);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 5px 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(246, 211, 101, 0.2);
        }

        .tab:hover .tab-icon {
            transform: scale(1.05);
            box-shadow: 0 12px 35px rgba(246, 211, 101, 0.3);
        }

        /* Tab Role (Customer / Trader) */
        .tab-role {
            font-size: clamp(1.2rem, 2.5vw, 1.8rem);
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Tab arrow hint */
        .tab-arrow {
            color: rgba(255, 255, 255, 0.2);
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .tab:hover .tab-arrow {
            color: #f6d365;
            transform: translateX(5px);
        }

        /* ============================================ */
        /* RESPONSIVE - SIMU                           */
        /* ============================================ */
        @media (max-width: 700px) {
            .tabs-container {
                flex-direction: column;
                align-items: center;
                gap: 25px;
            }

            .tab {
                width: 100%;
                max-width: 380px;
                padding: 30px 20px 25px;
            }

            .tab-icon {
                width: clamp(80px, 20vw, 110px);
                height: clamp(80px, 20vw, 110px);
                font-size: clamp(3.5rem, 12vw, 5rem);
            }

            .landing-title {
                font-size: clamp(1.5rem, 5vw, 2.5rem);
            }

            .landing-subtitle {
                font-size: clamp(0.9rem, 2.5vw, 1.2rem);
                margin-bottom: 30px;
            }
        }

        @media (max-width: 400px) {
            .tab {
                padding: 20px 15px 18px;
                min-width: unset;
            }

            .tab-icon {
                width: clamp(60px, 25vw, 80px);
                height: clamp(60px, 25vw, 80px);
                font-size: clamp(2.5rem, 15vw, 3.5rem);
            }

            .tab-label {
                font-size: 0.9rem;
            }

            .tab-role {
                font-size: 1rem;
            }

            .landing-title {
                font-size: 1.3rem;
            }
        }

        /* Welcoming page responsiveness */
        @media (max-width: 600px) {
            .animated-word {
                font-size: clamp(1.6rem, 6vw, 2.8rem) !important;
                letter-spacing: 0.02em;
            }
            .word-line:last-child .animated-word {
                font-size: clamp(1.4rem, 5.5vw, 2.5rem) !important;
                letter-spacing: 0.03em;
            }
            .text-container {
                padding: 20px 10px;
                gap: 6px;
            }
            .welcoming-footer {
                padding: 18px 10px 15px;
            }
            .footer-content .brand {
                font-size: 0.85rem;
            }
            .footer-content .powered {
                font-size: 0.6rem;
            }
        }

        @media (max-width: 400px) {
            .animated-word {
                font-size: clamp(1.2rem, 5vw, 2rem) !important;
            }
            .word-line:last-child .animated-word {
                font-size: clamp(1rem, 4.5vw, 1.8rem) !important;
            }
            .footer-content .brand {
                font-size: 0.75rem;
            }
            .cursor {
                height: 0.7em;
                width: 2px;
            }
        }

        @media (min-width: 1200px) {
            .animated-word {
                font-size: 4.5rem;
            }
            .word-line:last-child .animated-word {
                font-size: 4rem;
            }
        }
    </style>
</head>
<body>

    <!-- ============================================ -->
    <!-- WELCOMING PAGE                               -->
    <!-- ============================================ -->
    <div class="page" id="welcomingPage">
        <div class="welcoming-container">
            <div class="text-container">
                <!-- Line 1: EVOLUTIONARY -->
                <div class="word-line">
                    <div class="animated-word" id="animatedWord1">
                        <span class="cursor"></span>
                    </div>
                </div>
                <!-- Line 2: TRADING -->
                <div class="word-line">
                    <div class="animated-word" id="animatedWord2">
                        <span class="cursor"></span>
                    </div>
                </div>
            </div>

            <footer class="welcoming-footer">
                <div class="footer-content">
                    <div class="footer-divider"></div>
                    <span class="powered">
                        <i class="fa-regular fa-gem"></i>
                        Powered by
                    </span>
                    <span class="brand">
                        <i class="fa-solid fa-code"></i>
                        MudhihirjzTech
                    </span>
                </div>
            </footer>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- LANDING PAGE                                -->
    <!-- ============================================ -->
    <div class="page" id="landingPage">
        <div class="landing-container">

            <!-- Title -->
            <h1 class="landing-title">
                <i class="fa-solid fa-chart-line" style="font-size: 0.7em; margin-right: 10px; opacity: 0.5;"></i>
                EVOLUTIONARY TRADING SYSTEM
            </h1>

            <!-- Subtitle -->
            <p class="landing-subtitle">
                <i class="fa-regular fa-hand-peace" style="margin-right: 8px; color: #f6d365;"></i>
                Welcome to your new and updated community, online market.!
            </p>

            <!-- Tabs -->
            <div class="tabs-container">

                <!-- Tab 1: Customer -->
                <div class="tab" id="customerTab">
                    <div class="tab-label">
                        <i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>
                        Welcome to the market.!
                    </div>
                    <div class="tab-icon">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <div class="tab-role">Customer</div>
                    <div class="tab-arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

                <!-- Tab 2: Trader -->
                <div class="tab" id="traderTab">
                    <div class="tab-label">
                        <i class="fa-regular fa-hand-point-right" style="color: #f6d365; margin-right: 6px;"></i>
                        Welcome to the market.!
                    </div>
                    <div class="tab-icon">
                        <i class="fa-solid fa-briefcase"></i>
                    </div>
                    <div class="tab-role">Trader</div>
                    <div class="tab-arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- JAVASCRIPT                                  -->
    <!-- ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // 1. WELCOMING PAGE ANIMATION
            // ============================================
            const WORD1 = 'EVOLUTIONARY';
            const WORD2 = 'TRADING';

            const wordElement1 = document.getElementById('animatedWord1');
            const wordElement2 = document.getElementById('animatedWord2');

            let currentIndex1 = 0;
            let currentIndex2 = 0;
            let interval1 = null;
            let interval2 = null;

            function addLetter1() {
                if (currentIndex1 >= WORD1.length) {
                    clearInterval(interval1);
                    interval1 = null;
                    return;
                }
                const char = WORD1.charAt(currentIndex1);
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.opacity = '0';
                span.style.transform = 'translateX(-10px)';
                span.style.animation = 'fadeInChar 0.25s ease forwards';
                const cursor = wordElement1.querySelector('.cursor');
                wordElement1.insertBefore(span, cursor);
                currentIndex1++;
            }

            function addLetter2() {
                if (currentIndex2 >= WORD2.length) {
                    clearInterval(interval2);
                    interval2 = null;
                    return;
                }
                const char = WORD2.charAt(currentIndex2);
                const span = document.createElement('span');
                span.textContent = char;
                span.style.display = 'inline-block';
                span.style.opacity = '0';
                span.style.transform = 'translateX(-10px)';
                span.style.animation = 'fadeInChar 0.25s ease forwards';
                const cursor = wordElement2.querySelector('.cursor');
                wordElement2.insertBefore(span, cursor);
                currentIndex2++;
            }

            // CSS animation for chars
            const styleSheet = document.createElement('style');
            styleSheet.textContent = `
                        @keyframes fadeInChar {
                            0% { opacity: 0; transform: translateX(-12px) scale(0.9); }
                            100% { opacity: 1; transform: translateX(0) scale(1); }
                        }
                    `;
            document.head.appendChild(styleSheet);

            function startWelcomingAnimation() {
                wordElement1.innerHTML = '<span class="cursor"></span>';
                wordElement2.innerHTML = '<span class="cursor"></span>';
                currentIndex1 = 0;
                currentIndex2 = 0;

                if (interval1) clearInterval(interval1);
                if (interval2) clearInterval(interval2);

                addLetter1();
                interval1 = setInterval(addLetter1, 150);

                setTimeout(() => {
                    addLetter2();
                    interval2 = setInterval(addLetter2, 150);
                }, 800);
            }

            // ============================================
            // 2. PAGE TRANSITION
            // ============================================
            const welcomingPage = document.getElementById('welcomingPage');
            const landingPage = document.getElementById('landingPage');

            function transitionToLanding() {
                welcomingPage.classList.add('hidden');
                landingPage.classList.add('visible');
            }

            // ============================================
            // 3. TAB CLICK HANDLERS (navigate to pages later)
            // ============================================
            const customerTab = document.getElementById('customerTab');
            const traderTab = document.getElementById('traderTab');

            customerTab.addEventListener('click', function() {
                // Hapa utaweka navigation kwa Customer page
                // Kwa sasa, tunafanya animation ya feedback
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 200);
                // Badala ya console.log, tunaweza kuweka visual feedback
                // Kwa sasa, inabonyezwa tu
            });

            traderTab.addEventListener('click', function() {
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 200);
            });

            // ============================================
            // 4. INIT - START EVERYTHING
            // ============================================
            window.addEventListener('load', function() {
                // Anzisha welcoming animation
                setTimeout(startWelcomingAnimation, 300);

                // Baada ya sekunde 7, transition to landing page
                setTimeout(transitionToLanding, 3500);
            });

        })();
    </script>

</body>
</html>
