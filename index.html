<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>EVOLUTIONARY TRADING</title>
  <!-- Font Awesome 6 for icons only -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* Global reset – full height, no margin, no scroll unless needed, but we force fit */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevent any extra scroll that could show blank space */
      background: #0b0c0e; /* deep dark background, consistent */
      font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
    }

    /* Main container that holds both pages side by side conceptually, but only one visible */
    .app-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    /* Each page fills exactly the viewport */
    .page {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0b0c0e;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    /* Welcome page specific styling */
    .welcome-page {
      z-index: 10;
      background: radial-gradient(circle at center, #1a1e24 0%, #0b0c0e 90%);
    }

    /* Landing page hidden by default */
    .landing-page {
      z-index: 5;
      opacity: 0;
      visibility: hidden;
      background: linear-gradient(145deg, #0f1115 0%, #0b0c0e 100%);
    }

    .landing-page.active {
      opacity: 1;
      visibility: visible;
      z-index: 20;
    }

    /* ---- WELCOME PAGE TYPOGRAPHY ANIMATION ---- */
    .typing-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 0 16px;
      text-align: center;
    }

    .word-top, .word-bottom {
      font-weight: 700;
      letter-spacing: 2px;
      color: #f5e7d3;
      text-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      white-space: nowrap;
      overflow: hidden;
      display: inline-block;
      margin: 0 auto;
      line-height: 1.2;
      /* CURSOR REMOVED - no border-right */
      /* Font sizes responsive: mobile first */
      font-size: clamp(1.8rem, 8vw, 3.8rem);
    }

    .word-bottom {
      margin-top: 0.1em;
    }

    /* Footer for welcome page */
    .welcome-footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      color: #6b6b6b;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      font-weight: 300;
      padding: 0 16px;
    }

    /* ---- LANDING PAGE STYLES ---- */
    .landing-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      padding: 16px;
      text-align: center;
    }

    .main-headline {
      font-size: clamp(1.8rem, 7vw, 3.2rem);
      font-weight: 700;
      color: #e6d7b8;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
      text-shadow: 0 0 10px rgba(179, 141, 58, 0.7);
      line-height: 1.2;
    }

    .sub-headline {
      font-size: clamp(1rem, 4vw, 1.5rem);
      color: #b9a577;
      margin-bottom: 2.5rem;
      font-weight: 400;
      letter-spacing: 0.8px;
    }

    /* Tabs container: mobile column, desktop row */
    .tabs-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      gap: 20px;
      margin-bottom: 2rem;
    }

    /* Individual tab button styling */
    .tab-button {
      background: rgba(20, 22, 27, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 24px;
      padding: 1.8rem 1.5rem;
      width: 100%;
      max-width: 280px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #d4af37;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
      transition: all 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.5px;
      -webkit-tap-highlight-color: transparent; /* Removes tap highlight on mobile */
    }

    .tab-button i {
      font-size: 2.4rem;
      margin-bottom: 0.5rem;
      color: #d4af37;
      filter: drop-shadow(0 0 6px #c9a53b);
    }

    .tab-button .tab-title {
      font-size: 1.1rem;
      font-weight: 500;
      margin: 0.4rem 0 0.2rem;
      color: #f0e6d2;
    }

    .tab-button .tab-sub {
      font-size: 0.9rem;
      color: #b49450;
      margin-bottom: 0.6rem;
    }

    .tab-button .role-text {
      font-size: 1.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #ebd494;
    }

    .tab-button:hover {
      background: rgba(30, 33, 40, 0.95);
      border-color: #d4af37;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(212, 175, 55, 0.25);
    }

    /* Landing footer */
    .landing-footer {
      position: absolute;
      bottom: 16px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      color: #7a7a7a;
      font-size: 0.75rem;
      letter-spacing: 0.4px;
    }

    .footer-center {
      flex: 1;
      text-align: center;
    }

    .footer-right {
      position: absolute;
      right: 20px;
      font-weight: 400;
      color: #9e9e9e;
    }

    /* DESKTOP OVERRIDES: side by side tabs */
    @media (min-width: 768px) {
      .tabs-wrapper {
        flex-direction: row;
        gap: 32px;
        max-width: 650px;
      }
      
      .tab-button {
        max-width: 260px;
        padding: 2rem 1.2rem;
      }
      
      .landing-footer {
        bottom: 20px;
      }
    }

    /* Ensure no blank spaces even on weird aspect ratios */
    @supports (height: 100dvh) {
      .page {
        height: 100dvh;
      }
    }

    /* Remove any border highlight on tap */
    .tab-button:active {
      outline: none;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- WELCOME PAGE -->
    <div id="welcomePage" class="page welcome-page">
      <div class="typing-container">
        <div id="typingTop" class="word-top"></div>
        <div id="typingBottom" class="word-bottom"></div>
      </div>
      <div class="welcome-footer">
        <span>Powered by MudhihirjzTech</span>
      </div>
    </div>

    <!-- LANDING PAGE (hidden initially) -->
    <div id="landingPage" class="page landing-page">
      <div class="landing-content">
        <h1 class="main-headline">REVOLUTIONARY TRADING SYSTEM</h1>
        <p class="sub-headline">Welcome to the community, online market.!</p>
        
        <div class="tabs-wrapper">
          <!-- Customer tab -->
          <button class="tab-button" id="customerBtn" aria-label="Customer section">
            <i class="fas fa-building"></i>
            <span class="tab-title">welcome to the Market.!</span>
            <span class="role-text">CUSTOMER</span>
          </button>
          
          <!-- Trader tab -->
          <button class="tab-button" id="traderBtn" aria-label="Trader section">
            <i class="fas fa-briefcase"></i>
            <span class="tab-title">welcome to the Market.!</span>
            <span class="role-text">TRADER</span>
          </button>
        </div>
      </div>
      
      <div class="landing-footer">
        <span class="footer-center">All right reserved @2026</span>
        <span class="footer-right">v.1</span>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- TYPING ANIMATION FOR WELCOME PAGE ---
      const topElement = document.getElementById('typingTop');
      const bottomElement = document.getElementById('typingBottom');
      
      const wordTop = "EVOLUTION";
      const wordBottom = "TRADING";
      
      let topIndex = 0;
      let bottomIndex = 0;
      const typingSpeed = 120; // milliseconds per character
      
      // Clear initial content
      topElement.textContent = '';
      bottomElement.textContent = '';
      
      // We type top word first, then bottom word.
      function typeTop() {
        if (topIndex < wordTop.length) {
          topElement.textContent += wordTop[topIndex];
          topIndex++;
          setTimeout(typeTop, typingSpeed);
        } else {
          // Start typing bottom word after a small pause
          setTimeout(typeBottom, 200);
        }
      }
      
      function typeBottom() {
        if (bottomIndex < wordBottom.length) {
          bottomElement.textContent += wordBottom[bottomIndex];
          bottomIndex++;
          setTimeout(typeBottom, typingSpeed);
        } else {
          // Both words fully typed. Wait a moment then navigate to landing page.
          setTimeout(navigateToLanding, 1500);
        }
      }
      
      function navigateToLanding() {
        const landingPage = document.getElementById('landingPage');
        const welcomePage = document.getElementById('welcomePage');
        
        if (landingPage && welcomePage) {
          // Add active class to landing page for visibility
          landingPage.classList.add('active');
          // Optionally hide welcome page completely (still in DOM but behind)
          welcomePage.style.opacity = '0';
          welcomePage.style.visibility = 'hidden';
        }
      }
      
      // Start animation after a tiny delay to ensure DOM ready
      setTimeout(typeTop, 300);
      
      // --- LANDING PAGE BUTTON FUNCTIONALITY ---
      const customerBtn = document.getElementById('customerBtn');
      const traderBtn = document.getElementById('traderBtn');
      
      function handleCustomerClick(e) {
        e.preventDefault();
        window.location.href = 'customer.html';
      }
      
      function handleTraderClick(e) {
        e.preventDefault();
        window.location.href = 'trader.html';
      }
      
      if (customerBtn) {
        customerBtn.addEventListener('click', handleCustomerClick);
      }
      
      if (traderBtn) {
        traderBtn.addEventListener('click', handleTraderClick);
      }
      
      // --- HEIGHT MANAGEMENT (Single function to handle all) ---
      function adjustPageHeight() {
        const currentHeight = window.innerHeight;
        const pages = document.querySelectorAll('.page');
        pages.forEach(page => {
          page.style.height = currentHeight + 'px';
        });
        // Ensure body overflow is hidden
        document.body.style.overflow = 'hidden';
      }
      
      // Initial setup
      adjustPageHeight();
      
      // Update on resize and orientation change
      window.addEventListener('resize', adjustPageHeight);
      window.addEventListener('orientationchange', function() {
        setTimeout(adjustPageHeight, 300);
      });
      
      // Fix for some mobile browsers
      window.addEventListener('load', adjustPageHeight);
      
      // Observe landing page class changes to maintain height
      const landingPageEl = document.getElementById('landingPage');
      if (landingPageEl) {
        const observer = new MutationObserver(function() {
          adjustPageHeight();
        });
        observer.observe(landingPageEl, { attributes: true, attributeFilter: ['class'] });
      }
      
    })();
  </script>
</body>
</html>
